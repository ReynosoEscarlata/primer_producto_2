services:
  - type: web
    name: nutri-habits-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build --workspace=packages/shared && npm run build --workspace=apps/api && npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma
    startCommand: npm run start --workspace=apps/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: WEB_ORIGIN
        sync: false

  - type: web
    name: nutri-habits-web
    runtime: static
    buildCommand: npm install --include=dev && npm run build --workspace=packages/shared && npm run build --workspace=apps/web
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
