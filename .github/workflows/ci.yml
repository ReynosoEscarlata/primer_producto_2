name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    env:
      # No se conecta a una BD real en CI todavía — alcanza con que la variable
      # exista para que `prisma generate` (sin red) pueda leer el schema.
      DATABASE_URL: postgresql://user:password@localhost:5432/nutri_habits
      WEB_ORIGIN: http://localhost:5173
      JWT_ACCESS_SECRET: ci-placeholder
      JWT_REFRESH_SECRET: ci-placeholder
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
